<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Heart - MARIA</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
  background:#0a0010;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:Georgia,serif;
  overflow:hidden;
  -webkit-tap-highlight-color:transparent
}

/* ───── SCENE CONTAINER ───── */
#scene{
  position:relative;
  width:400px;
  height:400px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  touch-action:manipulation
}

/* ───── PULSE RINGS (behind canvas) ───── */
.pulse-ring{
  position:absolute;
  top:50%;left:50%;
  width:200px;height:200px;
  border-radius:50%;
  border:1.5px solid rgba(255,80,120,0.5);
  transform:translate(-50%,-50%) scale(0.9);
  opacity:0.7;
  pointer-events:none
}
#pulse1{animation:pulse-ring 1.1s ease-out infinite}
#pulse2{animation:pulse-ring 1.1s ease-out infinite;animation-delay:0.22s}

@keyframes pulse-ring{
  0%{transform:translate(-50%,-50%) scale(0.9);opacity:0.7}
  100%{transform:translate(-50%,-50%) scale(2.2);opacity:0}
}

/* ───── HEART CANVAS ───── */
#heartCanvas{
  position:absolute;
  top:0;left:0;
  width:400px;height:400px;
  z-index:2;
  transform-origin:center center;
  filter:drop-shadow(0 0 14px rgba(255,60,100,0.65)) drop-shadow(0 0 35px rgba(200,0,60,0.35))
}
#heartCanvas.beating{
  animation:beat 1.1s ease-in-out infinite
}
@keyframes beat{
  0%{transform:scale(1)}
  14%{transform:scale(1.14)}
  28%{transform:scale(0.97)}
  42%{transform:scale(1.09)}
  55%{transform:scale(1)}
  100%{transform:scale(1)}
}

/* ───── PARTICLE CANVAS (on top, no pointer) ───── */
#particleCanvas{
  position:absolute;
  top:0;left:0;
  width:400px;height:400px;
  z-index:5;
  pointer-events:none
}

/* ───── NAME REVEAL ───── */
#nameReveal{
  position:absolute;
  top:50%;left:50%;
  transform:translate(-50%,-50%) scale(0.3) rotate(-10deg);
  font:italic bold 58px Georgia,serif;
  color:#fff;
  letter-spacing:6px;
  text-shadow:0 0 20px rgba(255,180,200,1),0 0 50px rgba(255,80,120,0.7);
  opacity:0;
  z-index:3;
  pointer-events:none;
  white-space:nowrap;
  transition:transform 0.6s cubic-bezier(0.34,1.56,0.64,1),opacity 0.6s cubic-bezier(0.34,1.56,0.64,1)
}
#nameReveal.show{
  transform:translate(-50%,-50%) scale(1) rotate(0deg);
  opacity:1
}
#nameReveal.hide{
  opacity:0 !important;
  transform:translate(-50%,-50%) scale(0.8) !important;
  transition:all 0.3s ease-in !important
}

/* ───── FLOATING HEARTS ───── */
#floatingContainer{
  position:absolute;
  top:0;left:0;
  width:100%;height:100%;
  z-index:4;
  pointer-events:none
}
.float-heart{
  position:absolute;
  pointer-events:none;
  animation:floatUp 2.4s ease-out forwards
}
@keyframes floatUp{
  0%{transform:translateY(0) scale(1);opacity:1}
  100%{transform:translateY(-150px) scale(0.5);opacity:0}
}

/* ───── HINT TEXT ───── */
#hintText{
  margin-top:18px;
  font:13px Georgia,serif;
  color:rgba(255,180,200,0.5);
  animation:hint-breathe 2.5s ease-in-out infinite alternate;
  user-select:none
}
@keyframes hint-breathe{
  0%{opacity:0.3}
  100%{opacity:0.7}
}

/* ───── RESPONSIVE ───── */
@media(max-width:440px){
  #scene{width:340px;height:340px}
  #heartCanvas{width:340px;height:340px}
  #particleCanvas{width:340px;height:340px}
  #nameReveal{font-size:42px;letter-spacing:4px}
}
</style>
</head>
<body>

<div id="scene">
  <div class="pulse-ring" id="pulse1"></div>
  <div class="pulse-ring" id="pulse2"></div>
  <canvas id="heartCanvas" width="400" height="400"></canvas>
  <canvas id="particleCanvas" width="400" height="400"></canvas>
  <div id="nameReveal"></div>
  <div id="floatingContainer"></div>
</div>
<div id="hintText">Click the heart ❤</div>

<script>
/* ══════════════════════════════════════════════════
   CONSTANTS & CONFIG
   ══════════════════════════════════════════════════ */
const NAME = "MARIA";
const NAME_LETTERS = NAME.split(''); // ['M','A','R','I','A']
const CANVAS_SIZE = 400;
const NUM_POINTS = 320;
const DISPLAY_NAME = NAME.charAt(0) + NAME.slice(1).toLowerCase();

/* ───── Heart Curve Parametric Equations ───── */
function heartX(t) {
  return 16 * Math.pow(Math.sin(t), 3);
}
function heartY(t) {
  return -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
}
function heartDX(t) {
  return 48 * Math.pow(Math.sin(t), 2) * Math.cos(t);
}
function heartDY(t) {
  return 13 * Math.sin(t) - 10 * Math.sin(2*t) - 6 * Math.sin(3*t) - 4 * Math.sin(4*t);
}

/* ══════════════════════════════════════════════════
   GENERATE HEART POINTS
   ══════════════════════════════════════════════════ */
const rawPoints = [];
for (let i = 0; i < NUM_POINTS; i++) {
  const t = (i / NUM_POINTS) * 2 * Math.PI;
  rawPoints.push({
    x: heartX(t),
    y: heartY(t),
    dx: heartDX(t),
    dy: heartDY(t)
  });
}

// Compute bounding box
let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
for (const p of rawPoints) {
  if (p.x < minX) minX = p.x;
  if (p.x > maxX) maxX = p.x;
  if (p.y < minY) minY = p.y;
  if (p.y > maxY) maxY = p.y;
}

// Scale to fit ~320x300 area inside 400x400 canvas
const targetW = 320, targetH = 300;
const scale = Math.min(targetW / (maxX - minX), targetH / (maxY - minY));
const cx = CANVAS_SIZE / 2, cy = CANVAS_SIZE / 2;
const ox = cx - ((minX + maxX) / 2) * scale;
const oy = cy - ((minY + maxY) / 2) * scale;

// Build final point array with letter assignments, colors, etc.
const heartPoints = [];
for (let i = 0; i < NUM_POINTS; i++) {
  const p = rawPoints[i];
  const letter = NAME_LETTERS[i % NAME_LETTERS.length];
  const sx = p.x * scale + ox;
  const sy = p.y * scale + oy;
  const angle = Math.atan2(p.dy, p.dx);
  const yNorm = (p.y - minY) / (maxY - minY); // 0=bottom, 1=top

  // Interpolate color: bottom #C0003C → top #FF6B8A
  const r = Math.round(192 + (255 - 192) * yNorm);
  const g = Math.round(0 + (107 - 0) * yNorm);
  const b = Math.round(60 + (138 - 60) * yNorm);
  const color = `rgb(${r},${g},${b})`;

  heartPoints.push({
    letter,
    origX: sx,
    origY: sy,
    angle,
    color,
    yNorm,
    // Animated properties
    currentX: sx,
    currentY: sy,
    opacity: 1,
    // Burst/Reform
    scatterX: sx,
    scatterY: sy,
    index: i
  });
}

/* ══════════════════════════════════════════════════
   CANVAS SETUP
   ══════════════════════════════════════════════════ */
const heartCanvas = document.getElementById('heartCanvas');
const heartCtx = heartCanvas.getContext('2d');

const particleCanvas = document.getElementById('particleCanvas');
const particleCtx = particleCanvas.getContext('2d');

// High-DPI support
const dpr = window.devicePixelRatio || 1;
if (dpr > 1) {
  [heartCanvas, particleCanvas].forEach(canvas => {
    const w = CANVAS_SIZE * dpr;
    const h = CANVAS_SIZE * dpr;
    canvas.width = w;
    canvas.height = h;
    canvas.style.width = CANVAS_SIZE + 'px';
    canvas.style.height = CANVAS_SIZE + 'px';
    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
  });
}

/* ══════════════════════════════════════════════════
   DOM REFS
   ══════════════════════════════════════════════════ */
const scene = document.getElementById('scene');
const nameReveal = document.getElementById('nameReveal');
const hintText = document.getElementById('hintText');
const floatingContainer = document.getElementById('floatingContainer');

/* ══════════════════════════════════════════════════
   STATE
   ══════════════════════════════════════════════════ */
let state = 'beating'; // 'beating' | 'bursting' | 'revealed' | 'reforming'
let burstStartTime = 0;
let reformStartTime = 0;
let firstClickDone = false;
let animFrameId = null;

/* ───── Particles ───── */
let particles = [];

/* ───── Hint text messages ───── */
const HINT_INITIAL = 'Click the heart ❤';
const HINT_SECOND = 'Click again to rebuild 💫';

/* ══════════════════════════════════════════════════
   DRAWING — HEART LETTERS
   ══════════════════════════════════════════════════ */
function drawHeart(time) {
  heartCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

  for (let i = 0; i < heartPoints.length; i++) {
    const pt = heartPoints[i];
    const opacity = pt.opacity;
    if (opacity < 0.01) continue;

    heartCtx.save();
    heartCtx.translate(pt.currentX, pt.currentY);
    heartCtx.rotate(pt.angle);
    heartCtx.globalAlpha = opacity;
    heartCtx.font = 'italic bold 11px Georgia, serif';
    heartCtx.textAlign = 'center';
    heartCtx.textBaseline = 'middle';
    heartCtx.fillStyle = pt.color;
    heartCtx.fillText(pt.letter, 0, 0);
    heartCtx.restore();
  }
}

/* ───── Update shimmer (call every frame in beating/reformed state) ───── */
function updateShimmer(time) {
  const t = time * 2;
  for (let i = 0; i < heartPoints.length; i++) {
    // Traveling wave of brightness
    heartPoints[i].opacity = 0.85 + 0.15 * Math.sin(t + i * 0.4);
  }
}

/* ══════════════════════════════════════════════════
   BURST & REFORM
   ══════════════════════════════════════════════════ */
/* ─── Spring-like easing (easeOutBack) ─── */
function easeOutBack(t) {
  const c1 = 1.70158;
  const c3 = c1 + 1;
  return 1 + c3 * Math.pow(t - 1, 3) + c1 * Math.pow(t - 1, 2);
}

function startBurst() {
  // Disable CSS beat animation during burst
  heartCanvas.classList.remove('beating');
  void heartCanvas.offsetHeight;

  // Store scatter positions (random direction outward from center)
  for (const pt of heartPoints) {
    const angle = Math.random() * 2 * Math.PI;
    const dist = 100 + Math.random() * 160;
    pt.scatterX = pt.origX + Math.cos(angle) * dist;
    pt.scatterY = pt.origY + Math.sin(angle) * dist;
    pt.currentX = pt.origX;
    pt.currentY = pt.origY;
    pt.opacity = 1;
  }
  burstStartTime = performance.now();
  state = 'bursting';

  // Spawn particles & floating hearts
  spawnParticles();
  spawnFloatingHearts();

  // Schedule name reveal
  setTimeout(() => {
    if (state === 'bursting' || state === 'revealed') {
      nameReveal.textContent = DISPLAY_NAME;
      nameReveal.className = 'show';
    }
  }, 500);

  // Transition to revealed after burst
  setTimeout(() => {
    if (state === 'bursting') {
      state = 'revealed';
      firstClickDone = true;
      hintText.textContent = HINT_SECOND;
    }
  }, 650);
}

function updateBurst(elapsed) {
  const dur = 0.6;
  const progress = Math.min(elapsed / dur, 1);
  const eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic

  for (const pt of heartPoints) {
    pt.currentX = pt.origX + (pt.scatterX - pt.origX) * eased;
    pt.currentY = pt.origY + (pt.scatterY - pt.origY) * eased;
    pt.opacity = 1 - eased;
  }
}

function startReform() {
  // Fade out name
  nameReveal.className = 'hide';

  // Reset all points to their scatter positions (current positions)
  for (const pt of heartPoints) {
    pt.currentX = pt.scatterX;
    pt.currentY = pt.scatterY;
    pt.opacity = 0.3;
  }

  reformStartTime = performance.now();
  state = 'reforming';
  hintText.textContent = HINT_INITIAL;
}

function updateReform(elapsed) {
  const dur = 0.7;
  const progress = Math.min(elapsed / dur, 1);
  const eased = easeOutBack(progress);

  for (const pt of heartPoints) {
    pt.currentX = pt.scatterX + (pt.origX - pt.scatterX) * eased;
    pt.currentY = pt.scatterY + (pt.origY - pt.scatterY) * eased;
    pt.opacity = 0.3 + 0.7 * eased;
  }

  if (progress >= 1) {
    // Return to beating state
    state = 'beating';
    firstClickDone = false;
    heartCanvas.classList.remove('beating');
    void heartCanvas.offsetHeight;
    heartCanvas.classList.add('beating');
  }
}

/* ══════════════════════════════════════════════════
   PARTICLE EXPLOSION
   ══════════════════════════════════════════════════ */
const PARTICLE_COLORS = ['#FF6B8A','#FF3060','#FF90B0','#FFB3C8','#E8174A','#FFD6E0'];

function spawnParticles() {
  const count = 22;
  const centerX = CANVAS_SIZE / 2;
  const centerY = CANVAS_SIZE / 2;

  for (let i = 0; i < count; i++) {
    const angle = Math.random() * 2 * Math.PI;
    const speed = 1.5 + Math.random() * 2.3;
    particles.push({
      x: centerX,
      y: centerY,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 1.5, // upward bias
      radius: 2.5 + Math.random() * 2.5,
      color: PARTICLE_COLORS[Math.floor(Math.random() * PARTICLE_COLORS.length)],
      life: 1.0,
      decay: 0.016 + Math.random() * 0.014
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.045; // gravity
    p.life -= p.decay;
    if (p.life <= 0) {
      particles.splice(i, 1);
    }
  }
}

function drawParticles() {
  particleCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  for (const p of particles) {
    particleCtx.save();
    particleCtx.globalAlpha = Math.max(0, p.life);
    particleCtx.fillStyle = p.color;
    particleCtx.beginPath();
    particleCtx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
    particleCtx.fill();
    particleCtx.restore();
  }
}

/* ══════════════════════════════════════════════════
   FLOATING MINI HEARTS
   ══════════════════════════════════════════════════ */
function spawnFloatingHearts() {
  const symbols = ['\u2665','\u2661','\u2764','\uD83D\uDC95'];
  const colors = ['#FF6B8A','#FFB3C8','#FF3060','#FFAAC8'];

  for (let i = 0; i < 8; i++) {
    setTimeout(() => {
      const el = document.createElement('span');
      el.className = 'float-heart';
      el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      el.style.left = (30 + Math.random() * 340) + 'px';
      el.style.top = (80 + Math.random() * 220) + 'px';
      el.style.fontSize = (10 + Math.random() * 18) + 'px';
      el.style.color = colors[Math.floor(Math.random() * colors.length)];
      floatingContainer.appendChild(el);
      setTimeout(() => { if (el.parentNode) el.remove(); }, 2400);
    }, i * 130);
  }
}

/* ══════════════════════════════════════════════════
   MAIN ANIMATION LOOP
   ══════════════════════════════════════════════════ */
function animate(timestamp) {
  const timeSec = timestamp / 1000;

  if (state === 'beating') {
    updateShimmer(timeSec);
    drawHeart(timeSec);
  } else if (state === 'bursting') {
    const elapsed = (timestamp - burstStartTime) / 1000;
    updateBurst(elapsed);
    drawHeart(timeSec);
  } else if (state === 'reforming') {
    const elapsed = (timestamp - reformStartTime) / 1000;
    updateReform(elapsed);
    drawHeart(timeSec);
  } else if (state === 'revealed') {
    // In revealed state, the name div is shown.
    // We still draw the (now invisible/faded) heart underneath
    // so it's ready for reform.
    drawHeart(timeSec);
  }

  // Particles are always drawn if any exist
  if (particles.length > 0) {
    updateParticles();
    drawParticles();
  } else {
    particleCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
  }

  animFrameId = requestAnimationFrame(animate);
}

/* ══════════════════════════════════════════════════
   CLICK / TOUCH HANDLER
   ══════════════════════════════════════════════════ */
function handleClick(e) {
  e.preventDefault();

  if (state === 'beating') {
    startBurst();
  } else if (state === 'revealed' && firstClickDone) {
    startReform();
  }
  // Ignore clicks during burst/reform transitions
}

scene.addEventListener('click', handleClick);
scene.addEventListener('touchend', function(e) {
  e.preventDefault();
  handleClick(e);
});

/* ══════════════════════════════════════════════════
   INIT
   ══════════════════════════════════════════════════ */
nameReveal.textContent = DISPLAY_NAME;
hintText.textContent = HINT_INITIAL;

// Enable beating animation
heartCanvas.classList.add('beating');

// Draw initial heart
heartCtx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);
for (let i = 0; i < heartPoints.length; i++) {
  const pt = heartPoints[i];
  heartCtx.save();
  heartCtx.translate(pt.origX, pt.origY);
  heartCtx.rotate(pt.angle);
  heartCtx.globalAlpha = 0.85;
  heartCtx.font = 'italic bold 11px Georgia, serif';
  heartCtx.textAlign = 'center';
  heartCtx.textBaseline = 'middle';
  heartCtx.fillStyle = pt.color;
  heartCtx.fillText(pt.letter, 0, 0);
  heartCtx.restore();
}

// Start animation loop
animFrameId = requestAnimationFrame(animate);
</script>
</body>
</html>
