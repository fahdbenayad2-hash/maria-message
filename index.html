<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I'm sorry, Maria</title>
  <style>
    /* ===== RESET & BASE ===== */
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    /* ===== BACKGROUND — deep romantic gradient ===== */
    body {
      background: radial-gradient(ellipse at 50% 0%, #3a0020 0%, #1a0010 45%, #0a0008 100%);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== STAR CANVAS ===== */
    #stars-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ===== PARTICLE CANVAS (floating sparkles) ===== */
    #particle-canvas {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 1;
    }

    /* ===== CENTRE STAGE ===== */
    .stage {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      user-select: none;
    }

    /* ===== HEART WRAPPER — holds the pulse + glow layers ===== */
    .heart-wrap {
      position: relative;
      width: 240px;
      height: 240px;
      display: flex;
      align-items: center;
      justify-content: center;
      /* heartbeat scale animation */
      animation: heartbeat 1.2s ease-in-out infinite;
      cursor: pointer;
    }

    /* OUTER GLOW RING — pulsates slowly */
    .heart-wrap::before {
      content: '';
      position: absolute;
      inset: -30px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 50, 80, 0.18) 0%, transparent 70%);
      animation: glow-pulse 1.2s ease-in-out infinite;
    }

    /* INNER WARM GLOW */
    .heart-wrap::after {
      content: '';
      position: absolute;
      inset: 10px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 120, 100, 0.12) 0%, transparent 65%);
      animation: glow-pulse 1.2s ease-in-out infinite reverse;
    }

    /* ===== KEYFRAMES — heartbeat (double-thump) ===== */
    @keyframes heartbeat {
      0%   { transform: scale(1);    }
      10%  { transform: scale(1.12); }  /* first thump */
      20%  { transform: scale(0.97); }  /* relax */
      30%  { transform: scale(1.08); }  /* second thump */
      45%  { transform: scale(0.98); }
      100% { transform: scale(1);    }
    }

    /* ===== GLOW PULSE ===== */
    @keyframes glow-pulse {
      0%, 100% { opacity: 0.5; transform: scale(1);    }
      30%       { opacity: 1;   transform: scale(1.08); }
      60%       { opacity: 0.6; transform: scale(0.97); }
    }

    /* ===== SVG HEART ===== */
    .heart-svg {
      width: 200px;
      height: 200px;
      filter:
        drop-shadow(0 0 18px rgba(255, 60, 90, 0.9))
        drop-shadow(0 0 40px rgba(255, 30, 60, 0.55))
        drop-shadow(0 0 70px rgba(200, 0, 40, 0.35));
      position: relative;
      z-index: 1;
    }

    /* Heart path — CSS gradient fill via linearGradient in SVG */

    /* ===== TEXT ===== */
    .love-text {
      margin-top: 24px;
      font-size: clamp(2rem, 7vw, 3.6rem);
      font-weight: 700;
      letter-spacing: 0.18em;
      color: #fff;
      text-shadow:
        0 0 12px rgba(255, 100, 120, 1),
        0 0 30px rgba(255, 60, 80, 0.8),
        0 0 60px rgba(220, 30, 60, 0.5),
        0 0 100px rgba(180, 0, 40, 0.3);
      animation: text-breathe 2.4s ease-in-out infinite;
      font-family: 'Georgia', 'Times New Roman', serif;
    }

    @keyframes text-breathe {
      0%, 100% { opacity: 0.9; letter-spacing: 0.18em; }
      50%       { opacity: 1;   letter-spacing: 0.22em; }
    }

    /* ===== TAGLINE ===== */
    .tagline {
      margin-top: 14px;
      font-size: clamp(0.75rem, 2.5vw, 1rem);
      color: rgba(255, 180, 200, 0.65);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      animation: fade-in-up 2s ease forwards;
      font-family: 'Georgia', serif;
      font-style: italic;
    }

    @keyframes fade-in-up {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    /* ===== SMALL ORBITING HEARTS ===== */
    .orbit-ring {
      position: absolute;
      width: 300px;
      height: 300px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .mini-heart {
      position: absolute;
      font-size: 1.1rem;
      opacity: 0;
      animation: orbit 6s linear infinite;
      transform-origin: 150px 150px; /* centre of orbit-ring */
      top: -8px;
      left: 142px;
    }

    /* stagger each mini heart around the ring */
    .mini-heart:nth-child(1) { animation-delay: 0s;    color: #ff6688; }
    .mini-heart:nth-child(2) { animation-delay: -1.5s; color: #ff99aa; font-size: 0.8rem; }
    .mini-heart:nth-child(3) { animation-delay: -3s;   color: #ff4466; }
    .mini-heart:nth-child(4) { animation-delay: -4.5s; color: #ffaabb; font-size: 0.7rem; }

    @keyframes orbit {
      0%   { transform: rotate(0deg)   translateY(-145px) rotate(0deg);   opacity: 0;   }
      10%  { opacity: 0.9; }
      90%  { opacity: 0.9; }
      100% { transform: rotate(360deg) translateY(-145px) rotate(-360deg); opacity: 0; }
    }

    /* ===== RIPPLE on click ===== */
    .ripple {
      position: absolute;
      border-radius: 50%;
      border: 2px solid rgba(255, 100, 130, 0.7);
      width: 10px; height: 10px;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0);
      animation: ripple-expand 0.9s ease-out forwards;
      pointer-events: none;
    }

    @keyframes ripple-expand {
      to { transform: translate(-50%, -50%) scale(28); opacity: 0; }
    }

    /* ===== FLOATING HEARTS from click ===== */
    .float-heart {
      position: fixed;
      font-size: 1.4rem;
      pointer-events: none;
      animation: float-up 2s ease-out forwards;
      z-index: 10;
    }

    @keyframes float-up {
      0%   { transform: translateY(0)    scale(1)   rotate(0deg);   opacity: 1;   }
      100% { transform: translateY(-180px) scale(0.3) rotate(20deg); opacity: 0; }
    }

    /* ===== RESPONSIVE ===== */
    @media (max-width: 480px) {
      .heart-wrap { width: 180px; height: 180px; }
      .heart-svg  { width: 150px; height: 150px; }
      .orbit-ring { width: 230px; height: 230px; }
      .mini-heart { top: -6px; left: 108px; transform-origin: 115px 115px; }
      @keyframes orbit {
        0%   { transform: rotate(0deg)   translateY(-110px) rotate(0deg);   opacity: 0;   }
        10%  { opacity: 0.9; }
        90%  { opacity: 0.9; }
        100% { transform: rotate(360deg) translateY(-110px) rotate(-360deg); opacity: 0; }
      }
    }
  </style>
</head>
<body>

  <!-- Star field canvas -->
  <canvas id="stars-canvas"></canvas>
  <!-- Sparkle/particle canvas -->
  <canvas id="particle-canvas"></canvas>

  <!-- Centre stage -->
  <div class="stage">

    <!-- Orbiting mini hearts -->
    <div class="orbit-ring">
      <span class="mini-heart">♥</span>
      <span class="mini-heart">♥</span>
      <span class="mini-heart">♥</span>
      <span class="mini-heart">♥</span>
    </div>

    <!-- Main heart -->
    <div class="heart-wrap" id="heart-wrap" title="Click me!">
      <!-- SVG heart with gradient fill -->
      <svg class="heart-svg" viewBox="0 0 100 90" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <!-- radial gradient: bright centre → deep crimson edge -->
          <radialGradient id="hg" cx="50%" cy="38%" r="58%">
            <stop offset="0%"   stop-color="#ff8fa3" />
            <stop offset="35%"  stop-color="#ff3355" />
            <stop offset="75%"  stop-color="#cc1133" />
            <stop offset="100%" stop-color="#7a0020" />
          </radialGradient>
          <!-- subtle shine highlight -->
          <radialGradient id="shine" cx="38%" cy="30%" r="30%">
            <stop offset="0%"   stop-color="#ffffff" stop-opacity="0.35" />
            <stop offset="100%" stop-color="#ffffff" stop-opacity="0"    />
          </radialGradient>
        </defs>
        <!-- Heart path: two bezier arcs meeting at bottom point -->
        <path
          d="M50 85
             C20 65, 0 50, 0 30
             C0 13, 13 0, 28 0
             C36 0, 44 5, 50 12
             C56 5, 64 0, 72 0
             C87 0, 100 13, 100 30
             C100 50, 80 65, 50 85 Z"
          fill="url(#hg)"
        />
        <!-- Shine layer on top -->
        <path
          d="M50 85
             C20 65, 0 50, 0 30
             C0 13, 13 0, 28 0
             C36 0, 44 5, 50 12
             C56 5, 64 0, 72 0
             C87 0, 100 13, 100 30
             C100 50, 80 65, 50 85 Z"
          fill="url(#shine)"
        />
      </svg>
    </div>

    <!-- "I LOVE YOU" text -->
    <div class="love-text">I'm sorry Maria</div>

    <!-- Tagline -->

  </div>

  <script>
    /* =============================================
       STAR FIELD
       Renders a static star field once on a canvas.
    ============================================= */
    (function initStars() {
      const canvas = document.getElementById('stars-canvas');
      const ctx    = canvas.getContext('2d');

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
        drawStars();
      }

      function drawStars() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        const count = Math.floor((canvas.width * canvas.height) / 3000);

        for (let i = 0; i < count; i++) {
          const x    = Math.random() * canvas.width;
          const y    = Math.random() * canvas.height;
          const r    = Math.random() * 1.4 + 0.2;
          /* Tint stars slightly pink/white */
          const warm = Math.random() > 0.6;
          const col  = warm
            ? `rgba(255,${180 + Math.floor(Math.random()*60)},${190 + Math.floor(Math.random()*50)},`
            : `rgba(255,255,255,`;
          const alpha = Math.random() * 0.7 + 0.15;

          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = col + alpha + ')';
          ctx.fill();
        }
      }

      resize();
      window.addEventListener('resize', resize);
    })();


    /* =============================================
       FLOATING SPARKLE PARTICLES
       Tiny glowing dots that drift upward and fade.
    ============================================= */
    (function initParticles() {
      const canvas = document.getElementById('particle-canvas');
      const ctx    = canvas.getContext('2d');
      let W, H;
      const particles = [];

      /* Particle colours — red/pink/gold family */
      const COLORS = [
        'rgba(255,100,130,',
        'rgba(255,60,80,',
        'rgba(255,180,200,',
        'rgba(255,220,230,',
        'rgba(255,140,80,',
        'rgba(220,30,60,',
      ];

      function resize() {
        W = canvas.width  = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }

      /* Create a new sparkle at a random position */
      function spawn() {
        return {
          x:     Math.random() * W,
          y:     H * 0.3 + Math.random() * H * 0.6,  /* lower two-thirds */
          r:     Math.random() * 2.5 + 0.5,
          vx:    (Math.random() - 0.5) * 0.4,
          vy:    -(Math.random() * 0.8 + 0.3),
          alpha: Math.random() * 0.6 + 0.3,
          decay: Math.random() * 0.004 + 0.002,
          col:   COLORS[Math.floor(Math.random() * COLORS.length)],
          /* sparkle twinkle phase */
          phase: Math.random() * Math.PI * 2,
          freq:  Math.random() * 0.05 + 0.02,
        };
      }

      /* Initialise pool */
      resize();
      for (let i = 0; i < 90; i++) particles.push(spawn());
      window.addEventListener('resize', resize);

      function draw() {
        ctx.clearRect(0, 0, W, H);

        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.phase += p.freq;
          const twinkle = 0.5 + 0.5 * Math.sin(p.phase); /* 0 → 1 */
          const a = p.alpha * twinkle;

          /* Glow halo */
          const grad = ctx.createRadialGradient(p.x, p.y, 0, p.x, p.y, p.r * 4);
          grad.addColorStop(0,   p.col + a + ')');
          grad.addColorStop(0.4, p.col + (a * 0.4) + ')');
          grad.addColorStop(1,   p.col + '0)');
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r * 4, 0, Math.PI * 2);
          ctx.fillStyle = grad;
          ctx.fill();

          /* Solid core */
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
          ctx.fillStyle = p.col + Math.min(a * 2, 1) + ')';
          ctx.fill();

          /* Move */
          p.x += p.vx;
          p.y += p.vy;
          p.alpha -= p.decay;

          /* Recycle when faded or off-screen */
          if (p.alpha <= 0 || p.y < -20 || p.x < -20 || p.x > W + 20) {
            particles[i] = spawn();
          }
        }

        requestAnimationFrame(draw);
      }

      draw();
    })();


    /* =============================================
       INTERACTIVE: click heart → burst of hearts
       + ripple ring
    ============================================= */
    (function initInteraction() {
      const wrap = document.getElementById('heart-wrap');

      wrap.addEventListener('click', function(e) {
        /* 1. Ripple ring */
        const ripple = document.createElement('div');
        ripple.className = 'ripple';
        wrap.appendChild(ripple);
        ripple.addEventListener('animationend', () => ripple.remove());

        /* 2. Burst 6 floating hearts from click position */
        const rect   = wrap.getBoundingClientRect();
        const cx     = rect.left + rect.width  / 2;
        const cy     = rect.top  + rect.height / 2;
        const emojis = ['♥', '❤', '♡', '💕', '💗', '💖'];
        const count  = 6;

        for (let i = 0; i < count; i++) {
          const el = document.createElement('div');
          el.className  = 'float-heart';
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];

          /* Spread randomly around the centre */
          const spread = 60;
          el.style.left     = (cx + (Math.random() - 0.5) * spread) + 'px';
          el.style.top      = (cy + (Math.random() - 0.5) * spread) + 'px';
          el.style.fontSize = (Math.random() * 1.2 + 0.8) + 'rem';
          el.style.color    = `hsl(${340 + Math.random() * 30}deg, 100%, ${60 + Math.random() * 20}%)`;
          el.style.animationDelay = (i * 0.06) + 's';

          document.body.appendChild(el);
          el.addEventListener('animationend', () => el.remove());
        }
      });
    })();
  </script>

</body>
</html>
