<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="An interactive Valentine's Day experience">
  <meta name="theme-color" content="#c9184a">
  <title>Valentine's Day</title>
  <style>
    /* === 1. CSS LAYER: Design tokens → Base reset → Layout → Components → Animations === */

    /* --- Design Tokens --- */
    :root {
      --color-primary:     #c9184a;
      --color-secondary:   #ff6b9d;
      --color-accent:      #ff8fab;
      --color-surface:     #fff0f5;
      --color-text:        #3d0022;
      --color-text-muted:  #8b3a5a;
      --color-confetti-1:  #c9184a;
      --color-confetti-2:  #ff6b9d;
      --color-confetti-3:  #ff8fab;
      --color-confetti-4:  #ffb3c6;
      --color-confetti-5:  #ff4d6d;
      --radius-btn:        14px;
      --radius-card:       24px;
      --duration-fast:     150ms;
      --duration-base:     300ms;
      --duration-slow:     600ms;
      --easing-spring:     cubic-bezier(0.34, 1.56, 0.64, 1);
      --easing-smooth:     cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* --- Base Reset --- */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      font-size: 16px;
      -webkit-text-size-adjust: 100%;
    }

    body {
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.6;
      color: var(--color-text);
      background: linear-gradient(135deg, #1a0011 0%, #3d0022 30%, #5c0a3a 60%, #1a0011 100%);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* --- Layout --- */
    .scene {
      position: relative;
      width: 100%;
      max-width: 480px;
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    /* --- Components --- */
    .card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      padding: 2rem 1.5rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(201, 24, 74, 0.15);
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 400px;
      transition: opacity var(--duration-slow) var(--easing-smooth), transform var(--duration-slow) var(--easing-smooth);
    }

    .card--hidden {
      opacity: 0;
      transform: scale(0.85);
      pointer-events: none;
    }

    .card__headline {
      font-family: 'Georgia', 'Times New Roman', Times, serif;
      font-size: clamp(1.5rem, 5vw, 2.25rem);
      line-height: 1;
      color: var(--color-primary);
      margin-bottom: 0.75rem;
    }

    .card__sub {
      font-size: 1rem;
      color: var(--color-text-muted);
      margin-bottom: 1.5rem;
    }

    .card__actions {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      position: relative;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      font-size: 1rem;
      line-height: 1;
      font-weight: 600;
      padding: 0.75rem 2rem;
      border: none;
      border-radius: var(--radius-btn);
      cursor: pointer;
      transition: transform var(--duration-fast) var(--easing-spring), box-shadow var(--duration-fast) var(--easing-smooth);
      outline-offset: 3px;
      position: relative;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:focus-visible {
      outline: 3px solid var(--color-primary);
      outline-offset: 3px;
    }

    .btn--primary {
      background: var(--color-primary);
      color: #fff;
      box-shadow: 0 4px 16px rgba(201, 24, 74, 0.35);
    }

    .btn--primary:hover,
    .btn--primary:focus-visible {
      background: #ad1542;
      transform: translateY(-2px) scale(1.04);
      box-shadow: 0 6px 24px rgba(201, 24, 74, 0.45);
    }

    .btn--secondary {
      background: transparent;
      color: var(--color-primary);
      border: 2px solid var(--color-primary);
      position: relative;
      left: auto;
      top: auto;
      transform: none;
      white-space: nowrap;
      touch-action: none;
      transition: transform var(--duration-base) var(--easing-spring),
                  box-shadow var(--duration-fast) var(--easing-smooth),
                  background var(--duration-fast) var(--easing-smooth);
    }

    .btn--secondary:hover,
    .btn--secondary:focus-visible {
      background: rgba(201, 24, 74, 0.08);
    }

    .dodge-counter {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      margin-top: 1rem;
      min-height: 1.4em;
    }

    /* --- Celebration Card --- */
    .celebration {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
      padding: 1rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--duration-slow) var(--easing-smooth);
    }

    .celebration--visible {
      opacity: 1;
      pointer-events: auto;
    }

    .celebration__card {
      background: var(--color-surface);
      border-radius: var(--radius-card);
      padding: 2.5rem 2rem;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 60px rgba(201, 24, 74, 0.2);
      max-width: 440px;
      width: 100%;
      position: relative;
      z-index: 21;
      transform: scale(0.9);
      transition: transform var(--duration-slow) var(--easing-spring);
    }

    .celebration--visible .celebration__card {
      transform: scale(1);
    }

    .celebration__heart {
      font-size: 3rem;
      display: block;
      margin-bottom: 0.5rem;
      animation: pulse-heart 1.2s var(--easing-spring) infinite;
    }

    .celebration__message {
      font-family: 'Georgia', 'Times New Roman', Times, serif;
      font-size: clamp(1.25rem, 4vw, 1.75rem);
      line-height: 1.6;
      color: var(--color-primary);
      min-height: 3.2em;
    }

    .celebration__message::after {
      content: '|';
      animation: blink-cursor 0.7s steps(1) infinite;
    }

    .celebration__sub {
      font-size: 0.875rem;
      color: var(--color-text-muted);
      margin-top: 1rem;
      opacity: 0;
      transition: opacity var(--duration-base) var(--easing-smooth);
    }

    .celebration__sub--visible {
      opacity: 1;
      transition-delay: 3s;
    }

    /* --- Background Heart Rain --- */
    .hearts-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .heart-particle {
      position: absolute;
      bottom: -40px;
      width: 20px;
      height: 20px;
      opacity: 0;
      will-change: transform, opacity;
      animation: float-up 8s linear infinite;
    }

    .heart-particle::before {
      content: '\2665';
      display: block;
      font-size: inherit;
      line-height: 1;
      color: var(--color-accent);
    }

    /* --- Confetti --- */
    .confetti-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 30;
      overflow: hidden;
    }

    .confetti-particle {
      position: absolute;
      top: -10px;
      width: 10px;
      height: 10px;
      will-change: transform, opacity;
      animation: confetti-fall 3.5s ease-in forwards;
    }

    /* --- Animations --- */

    @media (prefers-reduced-motion: no-preference) {
      .heart-particle {
        animation: float-up var(--duration, 8s) linear infinite;
        animation-delay: var(--delay, 0s);
      }

      @keyframes float-up {
        0% {
          transform: translateY(0) translateX(0) rotate(0deg);
          opacity: var(--opacity, 0.3);
        }
        50% {
          opacity: var(--opacity, 0.3);
        }
        100% {
          transform: translateY(-110vh) translateX(30px) rotate(15deg);
          opacity: 0;
        }
      }

      .confetti-particle {
        animation: confetti-fall 3.5s ease-in forwards;
      }

      @keyframes confetti-fall {
        0% {
          transform: translateY(0) translateX(0) rotate(0deg) scale(1);
          opacity: 1;
        }
        30% {
          opacity: 1;
        }
        100% {
          transform: translateY(105vh) translateX(var(--drift, 60px)) rotate(var(--spin, 720deg)) scale(0.4);
          opacity: 0;
        }
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .heart-particle {
        display: none;
      }

      .confetti-particle {
        display: none;
      }

      .btn--secondary {
        transition: none;
      }

      .celebration__heart {
        animation: none;
      }
    }

    @keyframes pulse-heart {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    @keyframes blink-cursor {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* --- Responsive --- */

    @media (max-width: 480px) {
      .card {
        padding: 1.5rem 1rem;
      }

      .card__actions {
        gap: 0.75rem;
      }

      .btn {
        padding: 0.65rem 1.5rem;
        font-size: 0.9375rem;
      }
    }

    @media (min-width: 481px) {
      .scene {
        max-width: 520px;
      }

      .card {
        padding: 2.5rem 2rem;
      }

      .btn {
        padding: 0.875rem 2.5rem;
        font-size: 1.0625rem;
      }
    }

    @media (min-width: 769px) {
      .scene {
        max-width: 560px;
      }
    }

    /* --- Reduced motion: instant display --- */
    @media (prefers-reduced-motion: reduce) {
      .card--hidden {
        opacity: 0;
        transform: scale(1);
      }

      .celebration {
        transition: opacity var(--duration-base) var(--easing-smooth);
      }

      .celebration__card {
        transform: scale(1);
      }

      .celebration--visible .celebration__card {
        transform: scale(1);
      }
    }

    /* --- Accessibility: skip animation for motion users --- */
    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }
  </style>
</head>
<body>
  <!-- === 2. HTML LAYER: Semantic markup, ARIA roles, data-* attributes for state === -->

  <div class="scene" role="main">
    <!-- Question Card -->
    <article class="card" id="questionCard" data-phase="idle" role="dialog" aria-labelledby="questionHeadline" aria-modal="true">
      <h1 class="card__headline" id="questionHeadline">هل تقبلي ان تصبحي صديقتي</h1>
      <p class="card__sub">بكل حب كتبت هالأسطر عشانك ❤</p>
      <div class="card__actions">
        <button class="btn btn--primary" id="btnYes" type="button" aria-label="نعم، أقبل">
          Yes
        </button>
        <button class="btn btn--secondary" id="btnNo" type="button" aria-label="لا، بعدين">
          No
        </button>
      </div>
      <p class="dodge-counter" id="dodgeCounter" aria-live="polite" aria-atomic="true"></p>
    </article>

    <!-- Celebration Card -->
    <section class="celebration" id="celebration" role="alert" aria-live="assertive">
      <div class="celebration__card">
        <span class="celebration__heart">&#x2764;</span>
        <p class="celebration__message" id="celebrationMessage"></p>
        <p class="celebration__sub" id="celebrationSub">بنتظر لحظة العمر هذي بفارغ الصبر!</p>
      </div>
    </section>

    <!-- Background Hearts Container -->
    <div class="hearts-container" id="heartsContainer" aria-hidden="true"></div>

    <!-- Confetti Container -->
    <div class="confetti-container" id="confettiContainer" aria-hidden="true"></div>
  </div>

  <script>
    'use strict';

    /* === 3. JS LAYER: StateManager → EventBus → AnimationEngine → AudioEngine === */

    (function () {
      /* --- Constants --- */
      var HEART_POOL_SIZE = 20;
      var HEART_SIZES = { min: 16, max: 32 };
      var HEART_SPEEDS = { min: 6, max: 12 };
      var HEART_DELAYS = { max: 8 };
      var HEART_OPACITY = { min: 0.15, max: 0.45 };
      var CONFETTI_COUNT = 60;
      var CONFETTI_REMOVE_MS = 3500;
      var TYPEWRITER_INTERVAL_MS = 45;
      var DODGE_MARGIN = 60;
      var DODGE_PROXIMITY = 140;
      var DODGE_THRESHOLD = 3;
      var CELEBRATION_MESSAGE = '\u064A\u0639\u0646\u064A \u0623\u0643\u064A\u062F \u0645\u0627 \u0641\u064A \u0634\u0643 \uD83D\uDC97 \u064A\u0627 \u0644\u064A\u062A\u0646\u064A \u0645\u0639\u0643 \u062F\u0627\u0626\u0645\u0627\u064B!';

      /* ============================================================
         MODULE 1 — StateManager
         ============================================================ */

      /**
       * @typedef {Object} AppState
       * @property {'idle'|'dodging'|'accepted'|'rejected'} phase
       * @property {number} dodgeCount
       * @property {number|null} acceptedAt
       */

      /**
       * Creates the central state manager.
       * All UI mutations go through setState() — never mutate state directly.
       * @returns {{ setState: Function, getState: Function, subscribe: Function }}
       */
      function createStateManager() {
        /** @type {AppState} */
        var state = {
          phase: 'idle',
          dodgeCount: 0,
          acceptedAt: null,
        };

        /** @type {Function[]} */
        var listeners = [];

        /**
         * Apply a partial state patch and notify all subscribers.
         * The new state object is frozen to prevent external mutation.
         * @param {Partial<AppState>} patch
         */
        function setState(patch) {
          var prev = state;
          state = Object.freeze(Object.assign({}, state, patch));
          listeners.forEach(function (fn) {
            try { fn(state, prev); } catch (e) { /* swallow listener errors */ }
          });
        }

        /**
         * Returns the current frozen state object.
         * @returns {AppState}
         */
        function getState() {
          return state;
        }

        /**
         * Register a listener that fires on every state change.
         * Listener receives (newState, prevState).
         * @param {Function} fn
         * @returns {Function} unsubscribe
         */
        function subscribe(fn) {
          listeners.push(fn);
          return function () {
            var idx = listeners.indexOf(fn);
            if (idx !== -1) listeners.splice(idx, 1);
          };
        }

        return { setState: setState, getState: getState, subscribe: subscribe };
      }

      /* ============================================================
         MODULE 2 — EventBus
         ============================================================ */

      /**
       * Creates a lightweight pub/sub event bus.
       * Decouples UI events from animation and audio responses.
       * @returns {{ on: Function, emit: Function, off: Function }}
       */
      function createEventBus() {
        /** @type {Object<string, Function[]>} */
        var handlers = {};

        /**
         * Register a handler for a given event.
         * @param {string} event
         * @param {Function} handler
         */
        function on(event, handler) {
          if (!handlers[event]) handlers[event] = [];
          handlers[event].push(handler);
        }

        /**
         * Emit an event with an optional payload, calling all registered handlers.
         * Handlers are called in registration order; errors are caught silently.
         * @param {string} event
         * @param {*} [payload]
         */
        function emit(event, payload) {
          var list = handlers[event];
          if (!list) return;
          list.slice().forEach(function (fn) {
            try { fn(payload); } catch (e) { /* swallow handler errors */ }
          });
        }

        /**
         * Remove a specific handler for an event.
         * @param {string} event
         * @param {Function} handler
         */
        function off(event, handler) {
          var list = handlers[event];
          if (!list) return;
          handlers[event] = list.filter(function (fn) { return fn !== handler; });
        }

        return { on: on, emit: emit, off: off };
      }

      /* ============================================================
         MODULE 3 — AnimationEngine
         ============================================================ */

      /**
       * Manages all motion: heart rain, no-button escape, confetti, celebration.
       * Responds to EventBus 'user:hover-no' and 'user:accepted' events.
       * Respects prefers-reduced-motion via media query.
       * @param {Object} bus - EventBus instance
       * @param {Object} stateManager - StateManager instance
       * @returns {{ initHeartPool: Function }}
       */
      function createAnimationEngine(bus, stateManager) {
        var heartsContainer = document.getElementById('heartsContainer');
        var confettiContainer = document.getElementById('confettiContainer');
        var btnNo = document.getElementById('btnNo');
        var questionCard = document.getElementById('questionCard');
        var celebration = document.getElementById('celebration');
        var celebrationSub = document.getElementById('celebrationSub');
        var reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
        var heartPool = [];
        var dodgeRafPending = false;
        var noBtnFixed = false;

        /* --- Background heart rain (object pool) --- */

        /**
         * Initialize the object pool of 20 heart particles.
         * Only runs if the user has not requested reduced motion.
         * Each particle starts at a random x-position and floats upward via CSS.
         */
        function initHeartPool() {
          if (reducedMotion) return;

          for (var i = 0; i < HEART_POOL_SIZE; i++) {
            var el = document.createElement('span');
            el.className = 'heart-particle';
            el.setAttribute('aria-hidden', 'true');
            heartsContainer.appendChild(el);
            heartPool.push(el);
            resetHeart(el, true);
          }
        }

        /**
         * Reset a heart particle with randomized custom properties.
         * Uses CSS custom properties for duration, delay, opacity, and position
         * so animation is GPU-accelerated via CSS, not JS-driven.
         * @param {HTMLElement} el - The heart particle element
         * @param {boolean} [initial=false] - Whether this is initial setup (adds random delay)
         */
        function resetHeart(el, initial) {
          var size = HEART_SIZES.min + Math.random() * (HEART_SIZES.max - HEART_SIZES.min);
          var duration = HEART_SPEEDS.min + Math.random() * (HEART_SPEEDS.max - HEART_SPEEDS.min);
          var delay = initial ? Math.random() * HEART_DELAYS.max : 0;
          var opacity = HEART_OPACITY.min + Math.random() * (HEART_OPACITY.max - HEART_OPACITY.min);
          var x = Math.random() * 100;

          el.style.cssText =
            'left:' + x + '%;' +
            'font-size:' + size + 'px;' +
            'width:' + size + 'px;' +
            'height:' + size + 'px;' +
            '--duration:' + duration + 's;' +
            '--delay:' + delay + 's;' +
            '--opacity:' + opacity + ';';
        }

        /**
         * When a heart's animation cycle ends, recycle it by resetting properties.
         * This avoids creating/destroying DOM nodes in the animation loop.
         * @param {AnimationEvent} e
         */
        function onHeartAnimationEnd(e) {
          var el = e.target;
          if (el.classList.contains('heart-particle')) {
            resetHeart(el);
          }
        }

        heartsContainer.addEventListener('animationend', onHeartAnimationEnd);

        /* --- No button escape logic --- */

        /**
         * Compute a safe random position within viewport bounds.
         * Uses getBoundingClientRect() for accurate button dimensions.
         * Clamps position so the button never goes off-screen.
         * @returns {{ x: number, y: number }}
         */
        function computeSafePosition() {
          var rect = btnNo.getBoundingClientRect();
          var vw = window.innerWidth;
          var vh = window.innerHeight;

          var maxX = vw - rect.width - DODGE_MARGIN;
          var maxY = vh - rect.height - DODGE_MARGIN;
          var minX = DODGE_MARGIN;
          var minY = DODGE_MARGIN;

          if (maxX < minX) maxX = minX;
          if (maxY < minY) maxY = minY;

          return {
            x: Math.random() * (maxX - minX) + minX,
            y: Math.random() * (maxY - minY) + minY,
          };
        }

        /**
         * Move the No button to a random safe position using transform translate.
         * Uses position:fixed + translate() for GPU-accelerated motion.
         * Emits 'user:hover-no' on the EventBus after moving.
         * All DOM reads are batched in computeSafePosition before writes here.
         */
        function moveNoButton() {
          var pos = computeSafePosition();

          if (!noBtnFixed) {
            btnNo.style.cssText = 'position:fixed;left:0;top:0;z-index:50;transform:translate(' + pos.x + 'px,' + pos.y + 'px)';
            noBtnFixed = true;
          } else {
            btnNo.style.transform = 'translate(' + pos.x + 'px, ' + pos.y + 'px)';
          }

          bus.emit('user:hover-no', { x: pos.x, y: pos.y });
        }

        /**
         * Deferred dodge handler using requestAnimationFrame to avoid layout thrash.
         * Captures mouse coordinates synchronously from the event, then computes
         * proximity to the No button in the rAF callback. Only one rAF can be
         * pending at a time to prevent queue buildup.
         * @param {MouseEvent} e - The mousemove event
         */
        function onMouseMove(e) {
          if (stateManager.getState().phase === 'accepted') return;
          if (dodgeRafPending) return;

          var mx = e.clientX;
          var my = e.clientY;
          dodgeRafPending = true;
          window.requestAnimationFrame(function () {
            dodgeRafPending = false;

            var rect = btnNo.getBoundingClientRect();
            var cx = rect.left + rect.width / 2;
            var cy = rect.top + rect.height / 2;
            var dx = mx - cx;
            var dy = my - cy;
            var dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < DODGE_PROXIMITY) {
              attemptDodge();
            }
          });
        }

        /**
         * Touch handler for mobile — moves the No button on touchstart.
         * @param {TouchEvent} e
         */
        function onTouchStart(e) {
          e.preventDefault();
          attemptDodge();
        }

        /**
         * Attempt a dodge: increment dodgeCount, transition phase to 'dodging'
         * if needed, then move the button to a safe random position.
         * State changes trigger the subscriber which updates the dodge counter UI.
         */
        function attemptDodge() {
          if (stateManager.getState().phase === 'accepted') return;

          if (stateManager.getState().phase === 'idle') {
            stateManager.setState({ phase: 'dodging', dodgeCount: 1 });
          } else {
            stateManager.setState({ dodgeCount: stateManager.getState().dodgeCount + 1 });
          }

          moveNoButton();
        }

        /**
         * Update the dodge counter display.
         * Uses aria-live="polite" region for screen reader announcements.
         */
        function updateDodgeCounter() {
          var count = stateManager.getState().dodgeCount;
          var el = document.getElementById('dodgeCounter');

          if (count === 0) {
            el.textContent = '';
          } else if (count < DODGE_THRESHOLD) {
            el.textContent = 'Tried ' + count + ' time' + (count === 1 ? '' : 's') + '...';
          } else {
            el.textContent = 'Tried ' + count + ' times... You know you want to!';
          }
        }

        /**
         * Re-clamp the No button position on window resize so it stays on-screen.
         */
        function onWindowResize() {
          if (!noBtnFixed) return;
          if (stateManager.getState().phase === 'accepted') return;

          var pos = computeSafePosition();
          btnNo.style.transform = 'translate(' + pos.x + 'px, ' + pos.y + 'px)';
        }

        /* Register event listeners for the dodge mechanic */
        document.addEventListener('mousemove', onMouseMove, { passive: true });
        btnNo.addEventListener('touchstart', onTouchStart, { passive: false });
        window.addEventListener('resize', onWindowResize, { passive: true });

        /* --- Confetti burst --- */

        /**
         * Fire 60 confetti particles on 'user:accepted'.
         * Each particle gets random color, size, position, drift, spin, and shape.
         * Particles are removed from DOM after the 3.5s animation cycle via animationend.
         */
        function fireConfetti() {
          if (reducedMotion) return;

          var colors = [
            'var(--color-confetti-1)',
            'var(--color-confetti-2)',
            'var(--color-confetti-3)',
            'var(--color-confetti-4)',
            'var(--color-confetti-5)',
          ];

          var fragments = [];

          for (var i = 0; i < CONFETTI_COUNT; i++) {
            var el = document.createElement('div');
            el.className = 'confetti-particle';

            var color = colors[Math.floor(Math.random() * colors.length)];
            var size = 6 + Math.random() * 8;
            var x = Math.random() * 100;
            var drift = (Math.random() - 0.5) * 120;
            var spin = 360 + Math.random() * 720;
            var shape = Math.random();

            var borderRadius;
            if (shape < 0.33) {
              borderRadius = '50%';
            } else if (shape < 0.66) {
              borderRadius = '2px';
            } else {
              borderRadius = '0';
            }

            el.style.cssText =
              'left:' + x + '%;' +
              'width:' + size + 'px;' +
              'height:' + size + 'px;' +
              'background:' + color + ';' +
              'border-radius:' + borderRadius + ';' +
              '--drift:' + drift + 'px;' +
              '--spin:' + spin + 'deg;';

            confettiContainer.appendChild(el);
            fragments.push(el);
          }

          /* Remove each particle when its animation ends */
          fragments.forEach(function (el) {
            el.addEventListener('animationend', function onEnd() {
              el.removeEventListener('animationend', onEnd);
              if (el.parentNode) el.parentNode.removeChild(el);
            });
          });

          /* Fallback cleanup after maximum animation duration */
          setTimeout(function () {
            fragments.forEach(function (el) {
              if (el.parentNode) el.parentNode.removeChild(el);
            });
          }, CONFETTI_REMOVE_MS);
        }

        /* --- Celebration --- */

        /**
         * Show the celebration card with a typewriter effect on the message.
         * Hides the question card with a scale-out transition.
         */
        function showCelebration() {
          questionCard.classList.add('card--hidden');

          celebration.classList.add('celebration--visible');

          var msgEl = document.getElementById('celebrationMessage');
          var fullText = CELEBRATION_MESSAGE;
          var chars = Array.from(fullText);
          var idx = 0;
          msgEl.textContent = '';

          /**
           * Append one character at a time at TYPEWRITER_INTERVAL_MS speed.
           * Uses textContent with Array.from for correct Unicode handling
           * (surrogate pairs like emoji are preserved).
           */
          function typeChar() {
            if (idx < chars.length) {
              msgEl.textContent += chars[idx];
              idx++;
              setTimeout(typeChar, TYPEWRITER_INTERVAL_MS);
            } else {
              celebrationSub.classList.add('celebration__sub--visible');
            }
          }

          typeChar();
        }

        /**
         * Update the data-phase attribute on the question card for CSS targeting.
         * @param {AppState} state
         */
        function syncDataPhase(state) {
          questionCard.setAttribute('data-phase', state.phase);
        }

        /* --- Subscribe to state changes --- */
        stateManager.subscribe(function (state, prev) {
          syncDataPhase(state);
          updateDodgeCounter();

          if (state.phase === 'accepted' && prev.phase !== 'accepted') {
            showCelebration();
            fireConfetti();
            bus.emit('user:accepted');
          }
        });

        return { initHeartPool: initHeartPool };
      }

      /* ============================================================
         MODULE 4 — AudioEngine
         ============================================================ */

      /**
       * Creates the audio engine using the Web Audio API.
       * No audio files are loaded — all sounds are synthesized.
       * On 'user:accepted', plays a C4-E4-G4-C5 melodic sequence
       * with ADSR envelope via OscillatorNode + GainNode.
       * Gracefully falls back if AudioContext is blocked or unavailable.
       * @param {Object} bus - EventBus instance
       */
      function createAudioEngine(bus) {
        /** @type {AudioContext|null} */
        var audioCtx = null;

        /** @type {boolean} */
        var started = false;

        /**
         * Initializes the AudioContext (lazy, on first user gesture).
         * Falls back silently if the browser blocks Web Audio.
         */
        function initAudio() {
          if (started) return;
          try {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            started = true;
          } catch (e) {
            /* Browser policy or unsupported — graceful fallback */
            audioCtx = null;
          }
        }

        /**
         * Plays a short melodic tone sequence using oscillators with ADSR envelope.
         * Notes: C4 (262 Hz), E4 (330 Hz), G4 (392 Hz), C5 (523 Hz).
         * Each note has a sine waveform with attack/decay/sustain/release shaping.
         */
        function playMelody() {
          if (!audioCtx) return;

          /* Resume if suspended due to autoplay policy */
          if (audioCtx.state === 'suspended') {
            audioCtx.resume().catch(function () { /* noop */ });
          }

          var notes = [
            { freq: 261.63, start: 0, dur: 0.35 },
            { freq: 329.63, start: 0.3, dur: 0.35 },
            { freq: 392.00, start: 0.6, dur: 0.35 },
            { freq: 523.25, start: 0.9, dur: 0.7 },
          ];

          notes.forEach(function (note) {
            var now = audioCtx.currentTime;
            var osc = audioCtx.createOscillator();
            var gain = audioCtx.createGain();

            osc.type = 'sine';
            osc.frequency.setValueAtTime(note.freq, now + note.start);

            /* ADSR envelope values */
            var attack = 0.02;
            var decay = 0.05;
            var sustainLevel = 0.6;
            var release = 0.15;
            var peakGain = 0.3;

            var t = now + note.start;
            /* Attack: ramp up to peak */
            gain.gain.setValueAtTime(0, t);
            gain.gain.linearRampToValueAtTime(peakGain, t + attack);
            /* Decay: fall to sustain level */
            gain.gain.linearRampToValueAtTime(peakGain * sustainLevel, t + attack + decay);
            /* Sustain: hold until release phase */
            gain.gain.setValueAtTime(peakGain * sustainLevel, t + note.dur - release);
            /* Release: fade to 0 */
            gain.gain.linearRampToValueAtTime(0, t + note.dur);

            osc.connect(gain);
            gain.connect(audioCtx.destination);

            osc.start(t);
            osc.stop(t + note.dur);
          });
        }

        /* Listen for the accepted event to play the melody */
        bus.on('user:accepted', function () {
          initAudio();
          playMelody();
        });

        /* Initialize AudioContext on any user interaction (browser policy requirement) */
        var interactEvents = ['click', 'touchstart', 'keydown'];
        interactEvents.forEach(function (ev) {
          document.addEventListener(ev, initAudio, { once: true, passive: true });
        });
      }

      /* ============================================================
         Bootstrap
         ============================================================ */

      var stateManager = createStateManager();
      var bus = createEventBus();
      var engine = createAnimationEngine(bus, stateManager);
      createAudioEngine(bus);

      /* Initialize background heart rain */
      engine.initHeartPool();

      /* --- Yes button handler --- */
      document.getElementById('btnYes').addEventListener('click', function () {
        stateManager.setState({
          phase: 'accepted',
          acceptedAt: Date.now(),
        });
      });

      /* --- Prevent keyboard activation of the escaping No button --- */
      document.getElementById('btnNo').addEventListener('keydown', function (e) {
        if (e.key === 'Enter' || e.key === ' ') {
          e.preventDefault();
        }
      });

    })();
  </script>
</body>
