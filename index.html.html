<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>What's wrong, Maria?</title>

  <style>
    :root {
      --bg-1: #190010;
      --bg-2: #4a002b;
      --bg-3: #86004a;
      --panel: rgba(40, 0, 24, 0.58);
      --panel-border: rgba(255, 190, 225, 0.14);
      --text-main: #ffe2f3;
      --text-soft: rgba(255, 230, 243, 0.84);
      --accent-1: #ff5bbd;
      --accent-2: #ff8fd6;
      --shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      width: 100%;
      height: 100vh;
      overflow: hidden;
      font-family: Arial, Helvetica, sans-serif;
      color: white;
      background:
        radial-gradient(circle at top center, rgba(255, 90, 180, 0.28), transparent 28%),
        radial-gradient(circle at 15% 80%, rgba(255, 80, 140, 0.16), transparent 24%),
        radial-gradient(circle at 85% 20%, rgba(255, 120, 200, 0.14), transparent 22%),
        linear-gradient(180deg, var(--bg-3) 0%, var(--bg-2) 42%, var(--bg-1) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .bg-hearts {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 0;
    }

    .bg-hearts span {
      position: absolute;
      bottom: -60px;
      color: rgba(255, 185, 225, 0.18);
      text-shadow: 0 0 12px rgba(255, 90, 180, 0.35);
      animation: rise linear infinite;
      user-select: none;
    }

    @keyframes rise {
      0% {
        transform: translateY(0) scale(0.75) rotate(0deg);
        opacity: 0;
      }

      18% {
        opacity: 1;
      }

      100% {
        transform: translateY(-120vh) scale(1.35) rotate(10deg);
        opacity: 0;
      }
    }

    .app {
      position: relative;
      z-index: 2;
      width: min(94vw, 1000px);
      height: 100vh;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .panel {
      position: relative;
      width: 100%;
      max-height: calc(100vh - 20px);
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 26px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      padding: 16px;
      overflow: hidden;
      isolation: isolate;
    }

    .panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.06), transparent 22%, transparent 78%, rgba(255,255,255,0.04));
      pointer-events: none;
      z-index: -1;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }

    .eyebrow {
      letter-spacing: 0.22em;
      text-transform: uppercase;
      font-size: 12px;
      color: rgba(255, 222, 241, 0.82);
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255, 235, 245, 0.88);
      padding: 8px 12px;
      border-radius: 999px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ff82cf;
      box-shadow: 0 0 12px #ff82cf;
    }

    .scene {
      position: relative;
      width: 100%;
      height: 300px;
      border-radius: 22px;
      overflow: hidden;
      background:
        radial-gradient(circle at center, rgba(255, 90, 180, 0.10), transparent 28%),
        linear-gradient(180deg, rgba(56, 0, 34, 0.98), rgba(24, 0, 14, 0.98));
      border: 1px solid rgba(255,255,255,0.06);
      box-shadow:
        inset 0 0 30px rgba(255, 110, 190, 0.05),
        0 10px 40px rgba(0, 0, 0, 0.18);
    }

    #particleCanvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
    }

    .scene-glow {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -56%);
      background:
        radial-gradient(circle, rgba(255, 110, 200, 0.18), rgba(255, 110, 200, 0.08), transparent 72%);
      filter: blur(8px);
      pointer-events: none;
    }

    .content {
      padding: 14px 8px 4px;
      text-align: center;
    }

    .title {
      min-height: 52px;
      font-size: clamp(24px, 3.5vw, 44px);
      font-weight: 800;
      line-height: 1.1;
      color: var(--text-main);
      text-shadow:
        0 0 14px rgba(255, 102, 194, 0.45),
        0 0 28px rgba(255, 102, 194, 0.18);
      margin-bottom: 6px;
    }

    .subtitle {
      min-height: 44px;
      max-width: 760px;
      margin: 0 auto;
      font-size: clamp(14px, 1.5vw, 17px);
      line-height: 1.6;
      color: var(--text-soft);
    }

    .typing-caret::after {
      content: "";
      display: inline-block;
      width: 2px;
      height: 1.05em;
      margin-left: 6px;
      vertical-align: -0.12em;
      background: rgba(255, 214, 236, 0.95);
      animation: blink 900ms steps(1) infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .controls {
      margin-top: 16px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    .btn {
      border: none;
      outline: none;
      border-radius: 999px;
      padding: 14px 22px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: 220ms ease;
      user-select: none;
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      box-shadow: 0 10px 28px rgba(255, 91, 189, 0.28);
    }

    .btn-secondary {
      color: var(--text-main);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.08);
    }

    .btn:hover {
      transform: translateY(-2px) scale(1.02);
    }

    .btn-primary:hover {
      box-shadow: 0 14px 32px rgba(255, 91, 189, 0.42);
    }

    @media (max-width: 768px) {
      .app {
        padding: 10px;
      }

      .panel {
        padding: 12px;
      }

      .panel-header {
        justify-content: center;
        text-align: center;
      }

      .scene {
        height: 280px;
      }

      .controls {
        flex-direction: column;
      }

      .btn {
        width: 100%;
      }
    }
  </style>
</head>

<body>
  <div class="bg-hearts" id="bgHearts"></div>

  <main class="app">
    <section class="panel">
      <div class="panel-header">
        <div class="eyebrow">Interactive Emotional Message</div>

        <div class="status">
          <span class="status-dot"></span>
          <span>Live particle scene</span>
        </div>
      </div>

      <div class="scene">
        <canvas id="particleCanvas"></canvas>
        <div class="scene-glow"></div>
      </div>

      <div class="content">
        <h1 class="title typing-caret" id="title"></h1>
        <p class="subtitle" id="subtitle"></p>

        <div class="controls">
          <button class="btn btn-primary" id="nextMessageBtn">Next Message 💗</button>
          <button class="btn btn-secondary" id="changeShapeBtn">Change Symbol ✨</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const recipientName = "Maria";

    const messages = [
      {
        title: `What's wrong, ${recipientName}?`,
        subtitle: "You can talk to me. I'm here for you, and I will listen carefully."
      },
      {
        title: `Are you okay, ${recipientName}?`,
        subtitle: "If something is hurting you, you don't have to carry it alone."
      },
      {
        title: `Talk to me, ${recipientName}.`,
        subtitle: "Sometimes one honest message can make everything a little lighter."
      },
      {
        title: "I'm here for you.",
        subtitle: "I may not fix everything, but I can stay, listen, and understand."
      },
      {
        title: `You matter, ${recipientName}.`,
        subtitle: "No pressure. No judgment. Just honesty, care, and real support."
      }
    ];

    const shapes = ["?", "♡", "!"];
    let currentShapeIndex = 0;
    let currentMessageIndex = 0;

    const bgHearts = document.getElementById("bgHearts");

    function createFloatingHearts(count = 36) {
      for (let i = 0; i < count; i++) {
        const heart = document.createElement("span");
        heart.textContent = "♡";
        heart.style.left = `${Math.random() * 100}vw`;
        heart.style.fontSize = `${12 + Math.random() * 26}px`;
        heart.style.animationDuration = `${7 + Math.random() * 10}s`;
        heart.style.animationDelay = `${Math.random() * 6}s`;
        heart.style.opacity = (0.15 + Math.random() * 0.3).toFixed(2);
        bgHearts.appendChild(heart);
      }
    }

    createFloatingHearts();

    const titleEl = document.getElementById("title");
    const subtitleEl = document.getElementById("subtitle");

    let typingToken = 0;

    function typeText(element, text, speed = 30) {
      return new Promise((resolve) => {
        let i = 0;
        const token = ++typingToken;
        element.textContent = "";

        function step() {
          if (token !== typingToken) return;

          if (i < text.length) {
            element.textContent += text.charAt(i);
            i++;
            setTimeout(step, speed);
          } else {
            resolve();
          }
        }

        step();
      });
    }

    async function renderMessage(index) {
      const msg = messages[index];

      titleEl.classList.add("typing-caret");
      subtitleEl.textContent = "";

      await typeText(titleEl, msg.title, 34);

      titleEl.classList.remove("typing-caret");

      const words = msg.subtitle.split(" ");
      let built = "";

      for (let i = 0; i < words.length; i++) {
        built += (i ? " " : "") + words[i];
        subtitleEl.textContent = built;
        await new Promise(r => setTimeout(r, 28));
      }
    }

    const canvas = document.getElementById("particleCanvas");
    const ctx = canvas.getContext("2d");

    let width = 0;
    let height = 0;
    let particles = [];
    let targetPoints = [];
    let animationTime = 0;

    const PARTICLE_GAP = 7;
    const MAX_PARTICLES = 1600;

    function resizeCanvas() {
      const rect = canvas.getBoundingClientRect();

      width = Math.floor(rect.width * devicePixelRatio);
      height = Math.floor(rect.height * devicePixelRatio);

      canvas.width = width;
      canvas.height = height;
      canvas.style.width = rect.width + "px";
      canvas.style.height = rect.height + "px";

      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(devicePixelRatio, devicePixelRatio);

      width = rect.width;
      height = rect.height;

      updateTargetFromShape(shapes[currentShapeIndex], true);
    }

    function getPointsFromSymbol(symbol) {
      const off = document.createElement("canvas");
      const octx = off.getContext("2d");

      off.width = Math.max(1, Math.floor(width));
      off.height = Math.max(1, Math.floor(height));

      octx.clearRect(0, 0, off.width, off.height);

      const fontSize = Math.min(width, height) * 0.56;
      octx.fillStyle = "#ffffff";
      octx.textAlign = "center";
      octx.textBaseline = "middle";
      octx.font = `700 ${fontSize}px Arial`;
      octx.fillText(symbol, off.width / 2, off.height / 2 - off.height * 0.05);

      const img = octx.getImageData(0, 0, off.width, off.height).data;
      const points = [];

      for (let y = 0; y < off.height; y += PARTICLE_GAP) {
        for (let x = 0; x < off.width; x += PARTICLE_GAP) {
          const alpha = img[(y * off.width + x) * 4 + 3];

          if (alpha > 120) {
            points.push({ x, y });
          }
        }
      }

      return points.slice(0, MAX_PARTICLES);
    }

    function seedParticle(tx, ty) {
      const angle = Math.random() * Math.PI * 2;
      const radius = Math.random() * Math.min(width, height) * 0.18;

      return {
        x: width / 2 + Math.cos(angle) * radius,
        y: height / 2 + Math.sin(angle) * radius,
        tx,
        ty,
        size: Math.random() * 1.8 + 1.2,
        ease: Math.random() * 0.055 + 0.045
      };
    }

    function updateTargetFromShape(symbol, immediate = false) {
      targetPoints = getPointsFromSymbol(symbol);

      if (immediate || particles.length === 0) {
        particles = targetPoints.map(p => seedParticle(p.x, p.y));
        return;
      }

      if (particles.length < targetPoints.length) {
        while (particles.length < targetPoints.length) {
          const p = targetPoints[particles.length];
          particles.push(seedParticle(p.x, p.y));
        }
      } else if (particles.length > targetPoints.length) {
        particles.length = targetPoints.length;
      }

      for (let i = 0; i < targetPoints.length; i++) {
        particles[i].tx = targetPoints[i].x;
        particles[i].ty = targetPoints[i].y;
      }
    }

    function drawAmbientStars() {
      for (let i = 0; i < 42; i++) {
        const x = ((i * 91) + Math.sin(animationTime * 0.010 + i) * 20 + width) % width;
        const y = ((i * 57) + Math.cos(animationTime * 0.008 + i) * 18 + height) % height;

        ctx.beginPath();
        ctx.fillStyle = "rgba(255, 205, 232, 0.42)";
        ctx.shadowColor = "rgba(255, 120, 204, 0.8)";
        ctx.shadowBlur = 9;
        ctx.arc(x, y, 1.1, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    function drawCenterGlow() {
      const gx = width / 2;
      const gy = height / 2 - height * 0.05;
      const r = Math.min(width, height) * 0.18 * (1 + Math.sin(animationTime * 0.025) * 0.035);

      const gradient = ctx.createRadialGradient(gx, gy, 0, gx, gy, r);

      gradient.addColorStop(0, "rgba(255, 120, 210, 0.22)");
      gradient.addColorStop(0.45, "rgba(255, 120, 210, 0.08)");
      gradient.addColorStop(1, "rgba(255, 120, 210, 0)");

      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.arc(gx, gy, r, 0, Math.PI * 2);
      ctx.fill();
    }

    function animate() {
      animationTime++;

      ctx.clearRect(0, 0, width, height);

      drawCenterGlow();
      drawAmbientStars();

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];

        p.x += (p.tx - p.x) * p.ease;
        p.y += (p.ty - p.y) * p.ease;

        const flicker = 0.82 + Math.sin(animationTime * 0.07 + i * 0.35) * 0.18;
        const size = p.size * flicker;

        ctx.beginPath();
        ctx.fillStyle = "#ff96da";
        ctx.shadowColor = "#ff63c2";
        ctx.shadowBlur = 16;
        ctx.arc(p.x, p.y, size, 0, Math.PI * 2);
        ctx.fill();
      }

      requestAnimationFrame(animate);
    }

    const nextMessageBtn = document.getElementById("nextMessageBtn");
    const changeShapeBtn = document.getElementById("changeShapeBtn");

    nextMessageBtn.addEventListener("click", () => {
      currentMessageIndex = (currentMessageIndex + 1) % messages.length;
      currentShapeIndex = (currentShapeIndex + 1) % shapes.length;

      updateTargetFromShape(shapes[currentShapeIndex]);
      renderMessage(currentMessageIndex);
    });

    changeShapeBtn.addEventListener("click", () => {
      currentShapeIndex = (currentShapeIndex + 1) % shapes.length;
      updateTargetFromShape(shapes[currentShapeIndex]);
    });

    window.addEventListener("resize", resizeCanvas);

    resizeCanvas();
    renderMessage(currentMessageIndex);
    animate();
  </script>
</body>
</html>
